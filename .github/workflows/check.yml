name: ポケカ抽選チェック

on:
  schedule:
    # 15分ごと（UTC基準・GitHub側の都合で数分ずれることあり）
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # 手動実行ボタン

# 同時実行を防ぐ（状態ファイルの競合回避）
concurrency:
  group: chusen-check
  cancel-in-progress: false

permissions:
  contents: write  # state.json をコミットするため

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: 抽選チェック & 通知
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          # タイトル別チャンネル（未設定のものは該当タイトルをスキップ）
          DISCORD_CHANNEL_POKECA: ${{ secrets.DISCORD_CHANNEL_POKECA }}
          DISCORD_CHANNEL_ONEPIECE: ${{ secrets.DISCORD_CHANNEL_ONEPIECE }}
          DISCORD_CHANNEL_YUGIOH: ${{ secrets.DISCORD_CHANNEL_YUGIOH }}
          DISCORD_CHANNEL_FREE: ${{ secrets.DISCORD_CHANNEL_FREE }}
          # 後方互換: 上記が未設定なら旧単一チャンネル(pokeca)として使う
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          # ワンピ/遊戯王の入荷Now系ページURL（任意）
          NYUKA_URL_ONEPIECE: ${{ secrets.NYUKA_URL_ONEPIECE }}
          NYUKA_URL_YUGIOH: ${{ secrets.NYUKA_URL_YUGIOH }}
        run: python main.py

      - name: 状態を保存（変更があれば）
        run: |
          git config user.name "pokeca-chusen-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f state.json
          if git diff --staged --quiet; then
            echo "状態に変更なし"
          else
            git commit -m "chore: update lottery state [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi
