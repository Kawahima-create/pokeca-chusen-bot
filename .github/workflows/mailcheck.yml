name: 当選メールチェック

on:
  schedule:
    # 15分ごと（通知チェックと衝突しないよう7分ずらし）
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}

concurrency:
  group: mail-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mailcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: 当選メールをチェック & 通知
        env:
          ICLOUD_EMAIL: ${{ secrets.ICLOUD_EMAIL }}
          ICLOUD_APP_PASSWORD: ${{ secrets.ICLOUD_APP_PASSWORD }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          # 当落は運営者個人のもの。運営専用プライベートチャンネルにだけ流す
          DISCORD_CHANNEL_MAIL: ${{ secrets.DISCORD_CHANNEL_MAIL }}
          # 後方互換フォールバック（DISCORD_CHANNEL_MAIL 未設定時のみ使用）
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python mailcheck.py

      - name: 状態を保存（変更があれば）
        run: |
          git config user.name "pokeca-chusen-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f mail_state.json
          if git diff --staged --quiet; then
            echo "状態に変更なし"
          else
            git commit -m "chore: update mail state [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi
